name: CodeQL

on:
  push:
    branches: [master]
  pull_request:
  schedule:
    - cron: "0 7 * * 1"

permissions:
  security-events: write
  contents: read

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: github/codeql-action/init@v4
        with:
          languages: rust
          build-mode: none
      - uses: github/codeql-action/analyze@v4
        with:
          category: "/language:rust"
