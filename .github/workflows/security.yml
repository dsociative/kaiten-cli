name: Security

on:
  push:
    branches: [master]
    paths: ["**/Cargo.toml", "Cargo.lock", "deny.toml", ".github/workflows/security.yml"]
  pull_request:
    paths: ["**/Cargo.toml", "Cargo.lock", "deny.toml", ".github/workflows/security.yml"]
  schedule:
    - cron: "0 6 * * 1" # weekly: fresh RustSec advisories even without pushes

jobs:
  cargo-deny:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check
